<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Tree trunk -->
  <path d="M52 95 L55 55 Q58 40 60 35 Q62 40 65 55 L68 95" fill="#6D4C41" stroke="#5D4037" stroke-width="1"/>
  <path d="M48 95 L52 70 Q54 60 55 55" fill="#795548" stroke="none" opacity="0.5"/>
  <!-- Roots -->
  <path d="M48 95 Q40 100 35 102" stroke="#6D4C41" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M72 95 Q80 100 85 102" stroke="#6D4C41" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tree canopy layers -->
  <ellipse cx="60" cy="32" rx="35" ry="25" fill="#2E7D32"/>
  <ellipse cx="45" cy="35" rx="22" ry="18" fill="#388E3C"/>
  <ellipse cx="75" cy="35" rx="22" ry="18" fill="#388E3C"/>
  <ellipse cx="60" cy="25" rx="28" ry="18" fill="#43A047"/>
  <ellipse cx="50" cy="28" rx="15" ry="12" fill="#4CAF50"/>
  <ellipse cx="70" cy="28" rx="15" ry="12" fill="#4CAF50"/>
  <ellipse cx="60" cy="20" rx="18" ry="12" fill="#66BB6A"/>
  <!-- Treehouse body -->
  <rect x="45" y="48" width="30" height="22" rx="2" fill="#8D6E63"/>
  <rect x="44" y="46" width="32" height="4" rx="1" fill="#795548"/>
  <!-- Roof -->
  <polygon points="40,46 60,33 80,46" fill="#A1887F"/>
  <polygon points="42,46 60,35 78,46" fill="#BCAAA4"/>
  <!-- Windows with warm glow -->
  <rect x="50" y="53" width="7" height="7" rx="1" fill="#FFF9C4"/>
  <rect x="50" y="53" width="7" height="7" rx="1" fill="#FFE082" opacity="0.6"/>
  <rect x="63" y="53" width="7" height="7" rx="1" fill="#FFF9C4"/>
  <rect x="63" y="53" width="7" height="7" rx="1" fill="#FFE082" opacity="0.6"/>
  <!-- Door -->
  <rect x="56" y="60" width="8" height="10" rx="4" fill="#5D4037"/>
  <circle cx="62" cy="66" r="0.8" fill="#FFD54F"/>
  <!-- Ladder -->
  <line x1="72" y1="70" x2="78" y2="95" stroke="#8D6E63" stroke-width="2"/>
  <line x1="75" y1="70" x2="81" y2="95" stroke="#8D6E63" stroke-width="2"/>
  <line x1="72.8" y1="74" x2="75.8" y2="74" stroke="#A1887F" stroke-width="1.5"/>
  <line x1="73.6" y1="78" x2="76.6" y2="78" stroke="#A1887F" stroke-width="1.5"/>
  <line x1="74.4" y1="82" x2="77.4" y2="82" stroke="#A1887F" stroke-width="1.5"/>
  <line x1="75.2" y1="86" x2="78.2" y2="86" stroke="#A1887F" stroke-width="1.5"/>
  <line x1="76" y1="90" x2="79" y2="90" stroke="#A1887F" stroke-width="1.5"/>
  <!-- Sun rays (subtle) -->
  <circle cx="95" cy="12" r="8" fill="#FFF9C4" opacity="0.4"/>
  <circle cx="95" cy="12" r="5" fill="#FFE082" opacity="0.6"/>
